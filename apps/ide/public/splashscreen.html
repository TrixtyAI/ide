<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starting Trixty IDE</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --accent-color: #ffffff;
            --text-color: #ffffff;
            --secondary-text: #888888;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            cursor: default;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            animation: fadeIn 0.8s ease-out;
        }

        .logo-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            z-index: 10;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        .loader-ring {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.4));
        }

        .text-group {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #fff;
        }

        p {
            font-size: 13px;
            color: var(--secondary-text);
            margin: 0;
            font-weight: 500;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <div class="loader-ring"></div>
            <img src="logo.png" alt="Trixty Logo" class="logo-img">
        </div>
        <div class="text-group">
            <h1>Trixty IDE</h1>
            <p>Initializing AI Model</p>
        </div>
    </div>
</body>
</html>
