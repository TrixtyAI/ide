# Configuration for cargo-deny

[advisories]
version = 2
# The severity level at which an advisory will cause a failure.
# Options: notice, warning, error.
# Default is 'error'.
severity-threshold = "error"
# Any advisories to skip. You can use the advisory ID (e.g. RUSTSEC-2019-0001)
ignore = []

[licenses]
version = 2
# We check licenses to ensure no viral licenses are introduced by accident.
unlicensed = "error"
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "UPL-1.0",
    "Unicode-DFS-2016",
    "Zlib",
    "ISC",
]
confidence-threshold = 0.8

[bans]
version = 2
deny = []
skip = []
skip-tree = []

[sources]
version = 2
unknown-registry = "error"
unknown-git = "error"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
