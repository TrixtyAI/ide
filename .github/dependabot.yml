version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/" # Root for pnpm workspace
    schedule:
      interval: "daily"
    groups:
      security-updates:
        patterns:
          - "*"
        update-types:
          - "security"
    labels:
      - "dependencies"
      - "security"

  - package-ecosystem: "cargo"
    directory: "/apps/ide/src-tauri"
    schedule:
      interval: "daily"
    groups:
      security-updates:
        patterns:
          - "*"
        update-types:
          - "security"
    labels:
      - "dependencies"
      - "security"
