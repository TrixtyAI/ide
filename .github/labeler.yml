# labeler "full" schema
# enable labeler on issues, prs, or both.
enable:
  issues: true
  prs: true

# specific messages for issues and prs
comments:
  issues: |
    Thanks for opening this issue! I'll review it as soon as possible.
  prs: |
    Thanks for the contribution! I'll review it as soon as possible. If you have still changes, please mark this PR as draft and all reviews will be cancelled. Tests reviews will be re-run only when the PR is marked as ready for review.

# Labels is an object where:
# - keys are labels
# - values are objects of { include: [ pattern ], exclude: [ pattern ] }
#    - pattern must be a valid regex, and is applied globally to
#      title + description of issues and/or prs (see enabled config above)
#    - 'include' patterns will associate a label if any of these patterns match
#    - 'exclude' patterns will ignore this label if any of these patterns match
#    - 'branches' is an optional array of branch names (or patterns) to limit labeling according to PR target branch
labels:
  'bug':
    include:
      - '\\[Bug\\]:'
      - '\\[Fix\\]:'
      - '\bbug[s]?\b'
    exclude: []
    branches:
      - 'master'
      - 'main'
  'enhancement':
    include:
      - '\\[Feature\\]:'
      - '\\[Improvement\\]:'
      - '\bfeat\b'
      - '\benhancement\b'
    exclude: []
  'dependencies':
    include:
      - '\\[Deps\\]:'
      - '\bdeps\b'
      - '\bdependencies\b'
    exclude: []
  'documentation':
    include:
      - '\\[Docs\\]:'
      - '\bdocs?\b'
      - '\bdocumentation\b'
    exclude: []
  'help wanted':
    include:
      - '\bhelp( me)?\b'
    exclude:
      - '\b\[test(ing)?\]\b'
  'duplicate':
    include:
      - '\bduplicate\b'
      - '\bdupe\b'
    exclude: []
  'question':
    include:
      - '\bquestion\b'
    exclude: []
