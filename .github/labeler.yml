labels:
  - label: "bug"
    pattern: "\\[Bug\\]:|bug|issue|err|fault|failure"
  - label: "dependencies"
    pattern: "\\[Deps\\]:|deps|dependencies|yarn|npm|pnpm"
  - label: "documentation"
    pattern: "\\[Docs\\]:|docs?|documentation|readme"
  - label: "enhancement"
    pattern: "\\[Feature\\]:|\\[Improvement\\]:|feat|feature|enhancement|improvement|new|add"
  - label: "Feedback"
    pattern: "\\[Feedback\\]:|feedback|thought|suggestion"
  - label: "Fix"
    pattern: "\\[Fix\\]:|fix|patch|repair"
  - label: "github_actions"
    pattern: "ci|workflow|action|github_actions"
  - label: "question"
    pattern: "question|help|how-to|\\?"
  - label: "duplicate"
    pattern: "duplicate|already"
  - label: "wontfix"
    pattern: "wontfix|not planned"
