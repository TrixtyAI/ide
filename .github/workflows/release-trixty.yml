name: Trixty IDE Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.0
  workflow_dispatch: # Allow manual trigger

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Trixty IDE
        shell: pwsh
        run: .\scripts\build-trixty.ps1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trixty-win32-x64
          path: |
            ../*.exe
            ../*.zip

  build-linux:
    name: Build Linux x64
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'npm'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbfile-dev libsecret-1-dev pkg-config build-essential libkrb5-dev

      - name: Install Dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Trixty IDE
        run: bash ./scripts/build-trixty.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trixty-linux-x64
          path: |
            ../*.tar.gz
            ../*.deb
            ../*.rpm

  build-macos:
    name: Build macOS arm64
    needs: build-linux
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Trixty IDE
        run: bash ./scripts/build-trixty.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trixty-macos-arm64
          path: |
            ../*.dmg
            ../*.zip

  create-release:
    name: Create GitHub Release
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            trixty-win32-x64/*.exe
            trixty-win32-x64/*.zip
            trixty-linux-x64/*.tar.gz
            trixty-linux-x64/*.deb
            trixty-linux-x64/*.rpm
            trixty-macos-arm64/*.dmg
            trixty-macos-arm64/*.zip
          body: "Release of Trixty IDE - Multi-platform support enabled."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
