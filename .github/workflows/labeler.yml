name: Labeler

on:
  pull_request_target:
    types: [opened, edited, synchronized]
  issues:
    types: [opened, edited]

jobs:
  label:
    name: Apply labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Labeler Action
        uses: jimschubert/labeler-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
