name: Quality Checks
on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  NODE_VERSION: 24

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create logs directory
        run: mkdir logs

      - name: Save Metadata
        if: github.event_name == 'pull_request'
        run: |
          "${{ github.event.pull_request.number }}" | Out-File -FilePath logs/pr_number.txt -Encoding utf8
          "${{ github.event.pull_request.user.login }}" | Out-File -FilePath logs/author.txt -Encoding utf8

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: install frontend dependencies
        id: install
        run: |
          pnpm install --no-frozen-lockfile 2>&1 | Tee-Object -FilePath logs/install.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Sandbox Worker Bundle Up-to-date
        id: worker_bundle
        # Regenerate the sandbox worker IIFE and fail if it diverges from
        # what the PR committed. The sandbox worker is shipped as a
        # pre-compiled string (see scripts/build-extension-worker.mjs) so
        # the file must be rebuilt after any edit to
        # `extensionWorkerBootstrap.ts` or its dependencies.
        run: |
          pnpm --filter @trixty/desktop run build:worker 2>&1 | Tee-Object -FilePath logs/worker-bundle.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $diff = git status --porcelain apps/desktop/src/api/sandbox/extensionWorkerSource.generated.ts
          if ($diff) {
            Write-Host "::error::extensionWorkerSource.generated.ts is stale. Run `pnpm --filter @trixty/desktop run build:worker` and commit the result."
            git diff apps/desktop/src/api/sandbox/extensionWorkerSource.generated.ts | Tee-Object -FilePath logs/worker-bundle-diff.log
            exit 1
          }

      - name: Lint (Desktop)
        id: lint
        run: |
          pnpm --filter @trixty/desktop lint --max-warnings 0 2>&1 | Tee-Object -FilePath logs/lint.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Typecheck (Desktop)
        id: typecheck
        run: |
          pnpm --filter @trixty/desktop exec tsc --noEmit 2>&1 | Tee-Object -FilePath logs/typecheck.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Cargo Clippy
        id: clippy
        run: |
          cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml -- -D warnings 2>&1 | Tee-Object -FilePath logs/clippy.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Cargo Format Check
        id: fmt
        run: |
          cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml -- --check 2>&1 | Tee-Object -FilePath logs/fmt.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Vitest (Desktop)
        id: vitest
        run: |
          pnpm --filter @trixty/desktop test 2>&1 | Tee-Object -FilePath logs/vitest.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Cargo Test
        id: cargo_test
        run: |
          cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --lib 2>&1 | Tee-Object -FilePath logs/cargo-test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Generate status report
        if: always()
        run: |
          "install=${{ steps.install.outcome }}" | Out-File -FilePath logs/status.env -Append -Encoding utf8
          "worker_bundle=${{ steps.worker_bundle.outcome }}" | Out-File -FilePath logs/status.env -Append -Encoding utf8
          "lint=${{ steps.lint.outcome }}" | Out-File -FilePath logs/status.env -Append -Encoding utf8
          "typecheck=${{ steps.typecheck.outcome }}" | Out-File -FilePath logs/status.env -Append -Encoding utf8
          "clippy=${{ steps.clippy.outcome }}" | Out-File -FilePath logs/status.env -Append -Encoding utf8
          "fmt=${{ steps.fmt.outcome }}" | Out-File -FilePath logs/status.env -Append -Encoding utf8
          "vitest=${{ steps.vitest.outcome }}" | Out-File -FilePath logs/status.env -Append -Encoding utf8
          "cargo_test=${{ steps.cargo_test.outcome }}" | Out-File -FilePath logs/status.env -Append -Encoding utf8

      - name: Upload quality results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-results
          path: logs/
          retention-days: 1
