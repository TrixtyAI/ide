name: Bug Report
description: 'File a new bug report.'
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > Remember to use the latest version before submitting an issue. If you are using the latest version and encounter a bug, please use this form.

  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Provide steps to reproduce the bug
      value: |
        1.
        2.
        3.
        4.
    validations:
      required: true

  - type: input
    attributes:
      label: Trixty Version
      description:
      placeholder: 'vx.x.x'
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: What operating system are you using?
      multiple: false
      options:
        - Windows
        - MacOS
        - Linux
    validations:
      required: true
  - type: dropdown
    id: contribute_fix
    attributes:
      label: Would you like to fix this bug yourself by sending a PR?
      multiple: false
      options:
        - 'Yes'
        - 'No'
        - 'Maybe'
    validations:
      required: true

