name: Feature
description: 'Request a new feature or improvement'
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > Remember check for existing feature request before submit a new one.

  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: A clear and concise description of what you want to add.
    validations:
      required: true

  - type: dropdown
    id: contribute
    attributes:
      label: Would you like to implement this feature yourself by sending a PR?
      multiple: false
      options:
        - 'Yes'
        - 'No'
    validations:
      required: true

